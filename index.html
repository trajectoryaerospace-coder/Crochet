<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zanieke's Pink & Sunflower Crochet Studio 🌻💖</title>
  <style>
    :root {
      --primary-pink: #ff6b8b;
      --soft-pink: #ffb3c6;
      --bg-pink: #ffe6eb;
      --sunflower-yellow: #ffc107;
      --accent-yellow: #fef08a;
      --card-bg: #ffffff;
      --text: #4a2c33;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-pink);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating Background Animations */
    .bg-floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .float-item {
      position: absolute;
      bottom: -60px;
      font-size: 1.8rem;
      opacity: 0.7;
      animation: floatUp 10s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
    }

    .float-item:nth-child(1)  { left: 5%;  animation-duration: 9s;  animation-delay: 0s; }
    .float-item:nth-child(2)  { left: 18%; animation-duration: 12s; animation-delay: 2s; }
    .float-item:nth-child(3)  { left: 32%; animation-duration: 8s;  animation-delay: 4s; }
    .float-item:nth-child(4)  { left: 48%; animation-duration: 11s; animation-delay: 1s; }
    .float-item:nth-child(5)  { left: 62%; animation-duration: 10s; animation-delay: 5s; }
    .float-item:nth-child(6)  { left: 75%; animation-duration: 13s; animation-delay: 3s; }
    .float-item:nth-child(7)  { left: 88%; animation-duration: 9s;  animation-delay: 6s; }
    .float-item:nth-child(8)  { left: 25%; animation-duration: 14s; animation-delay: 7s; }
    .float-item:nth-child(9)  { left: 55%; animation-duration: 10s; animation-delay: 2.5s; }
    .float-item:nth-child(10) { left: 82%; animation-duration: 11s; animation-delay: 0.5s; }

    /* App Viewport */
    .app-viewport {
      width: 100%;
      max-width: 480px;
      background: #fffdf9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 25px rgba(255, 107, 139, 0.2);
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #ffb3c6 0%, #fef08a 100%);
      padding: 18px 16px;
      text-align: center;
      border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(255, 107, 139, 0.15);
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 3px solid var(--sunflower-yellow);
    }

    header h1 {
      color: #d81b60;
      font-size: 1.45rem;
      font-weight: 800;
      text-shadow: 1px 1px 0px #fff;
    }

    header p {
      font-size: 0.82rem;
      color: #6a1b29;
      font-weight: 600;
    }

    /* BOTTOM NAV */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
      border-top: 3.5px solid var(--primary-pink);
      box-shadow: 0 -8px 25px rgba(255, 107, 139, 0.3);
      z-index: 999999;
    }

    .nav-btn {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #7a4652;
      cursor: pointer;
      font-weight: 700;
      width: 23%;
      padding: 6px 2px;
      border-radius: 12px;
      transition: all 0.2s ease-in-out;
    }

    .nav-btn .icon {
      font-size: 1.2rem;
      margin-bottom: 2px;
      transition: transform 0.2s ease;
    }

    .nav-btn.active {
      color: #d81b60;
      background: #ffe6ec;
      border: 1.5px solid var(--primary-pink);
      box-shadow: 0 3px 8px rgba(255, 107, 139, 0.25);
    }

    .nav-btn.active .icon {
      transform: scale(1.15);
    }

    .content-area {
      padding: 14px;
      flex: 1;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(255, 179, 198, 0.2);
      border: 2px solid var(--soft-pink);
    }

    h2 {
      font-size: 1.15rem;
      color: #d81b60;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input, select, textarea, button.action-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--soft-pink);
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 10px;
      background: #fffdfa;
      color: var(--text);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-pink);
    }

    button.action-btn {
      background: linear-gradient(135deg, var(--primary-pink), var(--sunflower-yellow));
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 3px 8px rgba(255, 107, 139, 0.3);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 8px;
    }

    .btn-small {
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-edit {
      background: var(--sunflower-yellow);
      color: #4a2c33;
    }

    .btn-delete {
      background: #ff4d6d;
      color: white;
    }

    .remember-item {
      background: #fffdf0;
      border-left: 5px solid var(--sunflower-yellow);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #fffae6;
      border-bottom: 1px solid #fffae6;
      border-right: 1px solid #fffae6;
    }

    .counter-btns {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--primary-pink);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .technique-card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      border: 2px solid var(--soft-pink);
    }

    .badge {
      background: var(--accent-yellow);
      color: #854d0e;
      padding: 4px 9px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      display: inline-block;
      margin-right: 4px;
      margin-bottom: 6px;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
      border: 1px solid var(--soft-pink);
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* PROJECT & CHECKLIST STYLES */
    .project-card {
      background: white;
      border: 2px solid var(--soft-pink);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(255, 179, 198, 0.2);
    }

    .project-header {
      background: linear-gradient(135deg, #fffdfa 0%, #ffe6eb 100%);
      padding: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .project-header h3 {
      font-size: 1.05rem;
      color: #d81b60;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .project-header .expand-icon {
      font-size: 1.1rem;
      transition: transform 0.2s ease;
      color: var(--primary-pink);
    }

    .project-card.open .expand-icon {
      transform: rotate(180deg);
    }

    .project-body {
      display: none;
      padding: 14px;
      border-top: 1.5px solid var(--soft-pink);
      background: #fffdf9;
    }

    .project-card.open .project-body {
      display: block;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      background: #ffffff;
      border: 1.5px solid var(--soft-pink);
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
    }

    .checklist-left {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex: 1;
      cursor: pointer;
    }

    .checklist-item:hover {
      background: #fff8f9;
    }

    .checklist-item.completed {
      background: #f3f3f3;
      border-color: #ddd;
      opacity: 0.65;
    }

    .checklist-item.completed .checklist-text {
      text-decoration: line-through;
      color: #888;
    }

    .checklist-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--primary-pink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
      color: white;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .checklist-item.completed .checklist-checkbox {
      background: var(--primary-pink);
    }

    .checklist-text {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
    }

    .checklist-text .rnd-tag {
      font-weight: 800;
      color: #d81b60;
    }

    .checklist-text .note-tag {
      font-size: 0.78rem;
      color: #666;
      font-style: italic;
      display: block;
      margin-top: 2px;
    }

    .step-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .progress-bar-container {
      width: 100%;
      height: 10px;
      background: #ffe6eb;
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0 12px;
      border: 1px solid var(--soft-pink);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-pink), var(--sunflower-yellow));
      width: 0%;
      transition: width 0.3s ease;
    }

    .custom-step-box {
      background: #fff0f3;
      border: 1.5px dashed var(--primary-pink);
      border-radius: 12px;
      padding: 12px;
      margin-top: 14px;
    }

    .custom-step-box h4 {
      font-size: 0.85rem;
      color: #d81b60;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="bg-floating-container">
  <div class="float-item">🌻</div>
  <div class="float-item">💖</div>
  <div class="float-item">🌻</div>
  <div class="float-item">💕</div>
  <div class="float-item">💛</div>
  <div class="float-item">🌻</div>
  <div class="float-item">💗</div>
  <div class="float-item">🌻</div>
  <div class="float-item">💖</div>
  <div class="float-item">🌻</div>
</div>

<div class="app-viewport">
  <header>
    <h1>Zanieke's Crochet Studio 🌻💖</h1>
    <p>Live Sync Stitches, Counters & Projects</p>
  </header>

  <div class="content-area">

    <div id="remember" class="tab-content active">
      <div class="card">
        <h2>💡 Row & Stitch Rememberer</h2>
        <form id="remember-form">
          <input type="text" id="rem-title" placeholder="Thing to remember (e.g. Row 4 SC)" required>
          <input type="number" id="rem-target" placeholder="Times needed (e.g. 24)" min="1" required>
          <button type="submit" class="action-btn">+ Add Counter</button>
        </form>
      </div>
      <div id="remember-list"></div>
    </div>

    <div id="techniques" class="tab-content">
      <div class="card">
        <h2>🧶 Techniques & Stitches</h2>
        <input type="text" id="tech-search" placeholder="🔍 Search techniques..." oninput="renderTechniques()">
        
        <form id="custom-tech-form" style="margin-top:10px;">
          <input type="text" id="t-title" placeholder="Technique / Stitch Name" required>
          <select id="t-diff">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
          <input type="text" id="t-abbrev" placeholder="Abbreviation (e.g. MC, SC, DC)">
          <input type="text" id="t-videoUrl" placeholder="YouTube Video Link or Video ID">
          <textarea id="t-desc" placeholder="Short technique explanation..."></textarea>
          <button type="submit" class="action-btn">+ Add Technique</button>
        </form>
      </div>
      <div id="technique-list"></div>
    </div>

    <div id="journal" class="tab-content">
      <div class="card">
        <h2>📖 Project Journal</h2>
        <form id="journal-form">
          <input type="text" id="j-title" placeholder="Project Name" required>
          <input type="text" id="j-color" placeholder="Yarn & Colors Used">
          <input type="text" id="j-time" placeholder="Time Spent (e.g. 3 hours)">
          <input type="file" id="j-photo" accept="image/*">
          <textarea id="j-notes" placeholder="Notes & progress details..."></textarea>
          <button type="submit" class="action-btn">Log Project</button>
        </form>
      </div>
      <div id="journal-list"></div>
    </div>

    <div id="pattern" class="tab-content">
      <div class="card">
        <h2>📋 Project Checklists</h2>
        <form id="new-project-form">
          <input type="text" id="np-name" placeholder="New Project Name (e.g. Penguin Kit)" required>
          <input type="text" id="np-yarn" placeholder="Yarn colors / notes...">
          <button type="submit" class="action-btn">+ Create New Project</button>
        </form>
      </div>

      <div id="projects-container"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="navTab('remember', this)">
      <span class="icon">💡</span>Remember
    </button>
    <button class="nav-btn" onclick="navTab('techniques', this)">
      <span class="icon">🧶</span>Techniques
    </button>
    <button class="nav-btn" onclick="navTab('journal', this)">
      <span class="icon">📖</span>Journal
    </button>
    <button class="nav-btn" onclick="navTab('pattern', this)">
      <span class="icon">📋</span>Checklist
    </button>
  </nav>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApxQJFS8Ph-rl6NcTDU3_FiyQ5He_UM6Y",
    authDomain: "the-blob-articles.firebaseapp.com",
    databaseURL: "https://the-blob-articles-default-rtdb.firebaseio.com",
    projectId: "the-blob-articles",
    storageBucket: "the-blob-articles.firebasestorage.app",
    messagingSenderId: "546322985129",
    appId: "1:546322985129:web:4872de12fd455fb193b9b8",
    measurementId: "G-Y19BBJXSYG"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const defaultPenguinSteps = [
    { id: 1, rnd: "Rnd 1", text: "Working in to magic ring: 1ch, 6sc, ss=6sts", note: "Place stitch marker in first stitch, moving it up with each rnd.", done: false },
    { id: 2, rnd: "Rnd 2", text: "1ch, 6inc, ss=12sts", done: false },
    { id: 3, rnd: "Rnd 3", text: "1ch, (sc, inc)*6 times, ss=18sts", done: false },
    { id: 4, rnd: "Rnd 4", text: "1ch, (sc, inc, sc)*6 times, ss=24sts", done: false },
    { id: 5, rnd: "Rnd 5", text: "1ch, (3sc, inc)*6 times, ss=30sts", done: false },
    { id: 6, rnd: "Rnd 6", text: "1ch, (2sc, inc, 2sc)*6 times, ss=36sts", done: false },
    { id: 7, rnd: "Rnd 7", text: "1ch, 36sc, ss=36sts", done: false },
    { id: 8, rnd: "Rnd 8", text: "1ch, 13sc, (3sc White yarn), 4sc, (3sc White yarn), 13sc, ss=36sts", done: false },
    { id: 9, rnd: "Rnd 9-10", text: "1ch, 12sc, (5sc White yarn), 2sc, (5sc White yarn), 12sc, ss=36sts", done: false },
    { id: 10, rnd: "Rnd 11-14", text: "1ch, 11sc, (14sc White yarn), 11sc, ss=36sts", done: false },
    { id: 11, rnd: "Rnd 15", text: "1ch, 12sc, (12sc White yarn), 12sc, ss=36sts", done: false },
    { id: 12, rnd: "Rnd 16", text: "1ch, 14sc, (8sc White yarn), 14sc, ss=36sts", done: false },
    { id: 13, rnd: "Rnd 17", text: "1ch, (2sc, dec, 2sc)*6 times, ss=30sts", done: false },
    { id: 14, rnd: "Rnd 18", text: "1ch, (3sc, dec)*6 times, ss=24sts", done: false },
    { id: 15, rnd: "Rnd 19", text: "1ch, (sc, dec, sc)*6 times, ss=18sts", note: "Put in fiber fill, about 4g-6g", done: false },
    { id: 16, rnd: "Rnd 20", text: "1ch, (sc dec)*6 times, ss =12sts", done: false },
    { id: 17, rnd: "Rnd 21", text: "Pick up 12 FLO and tighten the opening cut tail", note: "Hiding the tail yarn inside the body", done: false }
  ];

  const defaultTechniques = [
    { id: 1, title: "Magic Circle (Magic Ring)", abbrev: "MC / MR", diff: "Beginner", diagramType: "ring", videoId: "p298HxgsO1s", desc: "An adjustable starting loop used for working in the round." },
    { id: 2, title: "Chain Stitch", abbrev: "CH", diff: "Beginner", diagramType: "chain", videoId: "o-Il8OcNAZA", desc: "The foundation stitch for almost all crochet projects." },
    { id: 3, title: "Single Crochet", abbrev: "SC", diff: "Beginner", diagramType: "wave", videoId: "wgVOkQcf5qw", desc: "A basic, tight stitch that creates a solid fabric." },
    { id: 4, title: "Double Crochet", abbrev: "DC", diff: "Beginner", diagramType: "tall_wave", videoId: "5xKssKskNzo", desc: "A tall stitch used for blankets, scarves, and granny squares." }
  ];

  window.appData = {
    remembers: [],
    techniques: defaultTechniques,
    projects: [],
    checklistProjects: [{
      id: "penguin_kit_default",
      name: "Penguin Kit",
      yarn: "green/pink/Purple/Light blue yarn",
      steps: defaultPenguinSteps,
      isOpen: true
    }]
  };

  // Sync Data to Firebase
  window.syncToFirebase = function() {
    set(ref(db, 'crochetStudio'), window.appData);
  };

  // Listen for Realtime Database Changes
  onValue(ref(db, 'crochetStudio'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      if (data.remembers) window.appData.remembers = data.remembers;
      if (data.techniques) window.appData.techniques = data.techniques;
      if (data.projects) window.appData.projects = data.projects;
      if (data.checklistProjects) window.appData.checklistProjects = data.checklistProjects;
    } else {
      window.syncToFirebase();
    }
    renderAll();
  });

  window.renderAll = function() {
    renderRemembers();
    renderTechniques();
    renderJournal();
    renderChecklistProjects();
  };

  window.navTab = function(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    window.scrollTo(0,0);
  };

  // --- 1. REMEMBER LOGIC ---
  document.getElementById('remember-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const title = document.getElementById('rem-title').value;
    const target = parseInt(document.getElementById('rem-target').value);
    if (!window.appData.remembers) window.appData.remembers = [];
    window.appData.remembers.push({ id: Date.now(), title, target, count: 0 });
    window.syncToFirebase();
    e.target.reset();
  });

  window.updateRemCount = function(id, delta) {
    const item = window.appData.remembers.find(r => r.id === id);
    if (item) {
      item.count = Math.max(0, item.count + delta);
      window.syncToFirebase();
    }
  };

  window.deleteRem = function(id) {
    if (confirm("Are you sure you want to delete this counter?")) {
      window.appData.remembers = window.appData.remembers.filter(r => r.id !== id);
      window.syncToFirebase();
    }
  };

  function renderRemembers() {
    const container = document.getElementById('remember-list');
    const items = window.appData.remembers || [];
    container.innerHTML = items.length ? '' : '<p style="text-align:center; color:#88505b;">No counters added yet 🌻</p>';

    items.forEach(item => {
      const done = item.count >= item.target;
      container.innerHTML += `
        <div class="remember-item">
          <div>
            <strong style="font-size:0.95rem;">${item.title}</strong>
            ${done ? ' <span style="color:#d81b60;">🎉 Done!</span>' : ''}
            <div style="font-size:0.75rem; color:#88505b;">Target: ${item.target} times</div>
          </div>
          <div class="counter-btns">
            <button class="btn-circle" onclick="updateRemCount(${item.id}, -1)">-</button>
            <span style="font-weight:bold; min-width: 40px; text-align:center;">${item.count}/${item.target}</span>
            <button class="btn-circle" onclick="updateRemCount(${item.id}, 1)">+</button>
            <button class="btn-small btn-delete" onclick="deleteRem(${item.id})">✕</button>
          </div>
        </div>
      `;
    });
  }

  // --- 2. TECHNIQUES LOGIC ---
  function extractYouTubeId(input) {
    if (!input) return 'wgVOkQcf5qw';
    input = input.trim();
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = input.match(regExp);
    return (match && match[2].length === 11) ? match[2] : input;
  }

  document.getElementById('custom-tech-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const title = document.getElementById('t-title').value;
    const vidId = extractYouTubeId(document.getElementById('t-videoUrl').value);

    if (!window.appData.techniques) window.appData.techniques = [];
    window.appData.techniques.unshift({
      id: Date.now(),
      title: title,
      abbrev: document.getElementById('t-abbrev').value || 'ST',
      diff: document.getElementById('t-diff').value,
      diagramType: 'wave',
      videoId: vidId,
      desc: document.getElementById('t-desc').value || 'Custom technique.'
    });
    window.syncToFirebase();
    e.target.reset();
  });

  window.deleteTechnique = function(id) {
    if (confirm("Are you sure you want to delete this technique?")) {
      window.appData.techniques = window.appData.techniques.filter(t => t.id !== id);
      window.syncToFirebase();
    }
  };

  function renderTechniques() {
    const query = (document.getElementById('tech-search').value || '').toLowerCase();
    const container = document.getElementById('technique-list');
    container.innerHTML = '';
    const list = window.appData.techniques || [];

    const filtered = list.filter(t => 
      t.title.toLowerCase().includes(query) ||
      t.abbrev.toLowerCase().includes(query) ||
      t.diff.toLowerCase().includes(query)
    );

    filtered.forEach(t => {
      const vidId = t.videoId || 'wgVOkQcf5qw';
      container.innerHTML += `
        <div class="technique-card">
          <div class="card-actions">
            <button class="btn-small btn-delete" onclick="deleteTechnique(${t.id})">🗑️ Delete</button>
          </div>
          <h3 style="font-size:1.1rem; color:#d81b60;">${t.title}</h3>
          
          <div style="margin:6px 0;">
            <span class="badge">${t.abbrev}</span>
            <span class="badge" style="background:#ffe6eb; color:#d81b60;">${t.diff}</span>
          </div>

          <p style="font-size:0.82rem; color:#555; margin-bottom:8px;">${t.desc}</p>

          <p style="font-size:0.75rem; color:#88505b; margin-top:8px;"><strong>📺 Video Tutorial:</strong></p>
          <div class="video-container">
            <iframe src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
      `;
    });
  }

  // --- 3. JOURNAL LOGIC ---
  document.getElementById('journal-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const photo = document.getElementById('j-photo').files[0];
    const save = (imgData) => {
      if (!window.appData.projects) window.appData.projects = [];
      window.appData.projects.unshift({
        id: Date.now(),
        title: document.getElementById('j-title').value,
        color: document.getElementById('j-color').value,
        time: document.getElementById('j-time').value,
        notes: document.getElementById('j-notes').value,
        photo: imgData || ''
      });
      window.syncToFirebase();
      e.target.reset();
    };

    if (photo) {
      const reader = new FileReader();
      reader.onload = (evt) => save(evt.target.result);
      reader.readAsDataURL(photo);
    } else {
      save('');
    }
  });

  window.deleteJournal = function(id) {
    if (confirm("Are you sure you want to delete this journal project entry?")) {
      window.appData.projects = window.appData.projects.filter(p => p.id !== id);
      window.syncToFirebase();
    }
  };

  function renderJournal() {
    const listContainer = document.getElementById('journal-list');
    const list = window.appData.projects || [];
    listContainer.innerHTML = list.length ? '' : '<p style="text-align:center; color:#88505b;">No projects logged yet 🌻</p>';
    list.forEach(p => {
      listContainer.innerHTML += `
        <div class="card">
          <div class="card-actions">
            <button class="btn-small btn-delete" onclick="deleteJournal(${p.id})">🗑️ Delete</button>
          </div>
          ${p.photo ? `<img src="${p.photo}" style="width:100%; height:160px; object-fit:cover; border-radius:10px; margin-bottom:8px;">` : ''}
          <h3 style="font-size:1.05rem; color:#d81b60;">${p.title}</h3>
          <p style="font-size:0.82rem; margin:4px 0;"><strong>Yarn / Colors:</strong> ${p.color || 'N/A'}</p>
          <p style="font-size:0.82rem; margin:4px 0;"><strong>Time Spent:</strong> ${p.time || 'N/A'}</p>
          <p style="font-size:0.82rem; color:#666; font-style:italic; margin-top:6px;">"${p.notes}"</p>
        </div>
      `;
    });
  }

  // --- 4. PROJECT CHECKLIST LOGIC ---
  document.getElementById('new-project-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('np-name').value;
    const yarn = document.getElementById('np-yarn').value;

    if (!window.appData.checklistProjects) window.appData.checklistProjects = [];
    window.appData.checklistProjects.push({
      id: 'proj_' + Date.now(),
      name: name,
      yarn: yarn || '',
      steps: [],
      isOpen: true
    });
    window.syncToFirebase();
    e.target.reset();
  });

  window.toggleProjectExpand = function(projId) {
    const proj = window.appData.checklistProjects.find(p => p.id === projId);
    if (proj) {
      proj.isOpen = !proj.isOpen;
      window.syncToFirebase();
    }
  };

  window.toggleChecklistStep = function(projId, stepId) {
    const proj = window.appData.checklistProjects.find(p => p.id === projId);
    if (proj && proj.steps) {
      const step = proj.steps.find(s => s.id === stepId);
      if (step) {
        step.done = !step.done;
        window.syncToFirebase();
      }
    }
  };

  window.editChecklistStep = function(event, projId, stepId) {
    event.stopPropagation();
    const proj = window.appData.checklistProjects.find(p => p.id === projId);
    if (!proj || !proj.steps) return;
    const step = proj.steps.find(s => s.id === stepId);
    if (!step) return;

    const newRnd = prompt("Edit Round / Step Label:", step.rnd);
    if (newRnd === null) return;

    const newText = prompt("Edit Instruction / Description:", step.text);
    if (newText === null) return;

    const newNote = prompt("Edit Note (leave blank if none):", step.note || '');
    if (newNote === null) return;

    step.rnd = newRnd.trim() || step.rnd;
    step.text = newText.trim() || step.text;
    step.note = newNote.trim();
    window.syncToFirebase();
  };

  window.deleteChecklistStep = function(event, projId, stepId) {
    event.stopPropagation();
    if (confirm("Are you sure you want to delete this step from the checklist?")) {
      const proj = window.appData.checklistProjects.find(p => p.id === projId);
      if (proj && proj.steps) {
        proj.steps = proj.steps.filter(s => s.id !== stepId);
        window.syncToFirebase();
      }
    }
  };

  window.addCustomStepToProject = function(e, projId) {
    e.preventDefault();
    const rndInput = document.getElementById(`step-rnd-${projId}`);
    const textInput = document.getElementById(`step-text-${projId}`);
    const noteInput = document.getElementById(`step-note-${projId}`);

    const proj = window.appData.checklistProjects.find(p => p.id === projId);
    if (proj) {
      if (!proj.steps) proj.steps = [];
      proj.steps.push({
        id: Date.now(),
        rnd: rndInput.value.trim(),
        text: textInput.value.trim(),
        note: noteInput.value.trim(),
        done: false
      });
      window.syncToFirebase();
    }
  };

  window.deleteChecklistProject = function(projId) {
    if (confirm("Are you sure you want to delete this whole project checklist?")) {
      window.appData.checklistProjects = window.appData.checklistProjects.filter(p => p.id !== projId);
      window.syncToFirebase();
    }
  };

  window.resetProjectChecklist = function(projId) {
    const proj = window.appData.checklistProjects.find(p => p.id === projId);
    if (proj && proj.steps && confirm("Are you sure you want to reset all checks for this project?")) {
      proj.steps.forEach(s => s.done = false);
      window.syncToFirebase();
    }
  };

  function renderChecklistProjects() {
    const container = document.getElementById('projects-container');
    const projects = window.appData.checklistProjects || [];
    container.innerHTML = projects.length ? '' : '<p style="text-align:center; color:#88505b;">No checklist projects created yet 🌻</p>';

    projects.forEach(proj => {
      const steps = proj.steps || [];
      const completedCount = steps.filter(s => s.done).length;
      const percent = steps.length ? Math.round((completedCount / steps.length) * 100) : 0;

      let stepsHtml = '';
      steps.forEach(step => {
        stepsHtml += `
          <div class="checklist-item ${step.done ? 'completed' : ''}">
            <div class="checklist-left" onclick="toggleChecklistStep('${proj.id}', ${step.id})">
              <div class="checklist-checkbox">${step.done ? '✓' : ''}</div>
              <div class="checklist-text">
                <span class="rnd-tag">${step.rnd}:</span> ${step.text}
                ${step.note ? `<span class="note-tag">📌 ${step.note}</span>` : ''}
              </div>
            </div>
            <div class="step-actions">
              <button class="btn-small btn-edit" onclick="editChecklistStep(event, '${proj.id}', ${step.id})">✏️</button>
              <button class="btn-small btn-delete" onclick="deleteChecklistStep(event, '${proj.id}', ${step.id})">🗑️</button>
            </div>
          </div>
        `;
      });

      container.innerHTML += `
        <div class="project-card ${proj.isOpen ? 'open' : ''}">
          <div class="project-header" onclick="toggleProjectExpand('${proj.id}')">
            <div>
              <h3>🧶 ${proj.name}</h3>
              ${proj.yarn ? `<p style="font-size:0.75rem; color:#7a4652; margin-top:2px;">Yarn: ${proj.yarn}</p>` : ''}
            </div>
            <span class="expand-icon">▼</span>
          </div>

          <div class="project-body">
            <div class="progress-bar-container">
              <div class="progress-bar-fill" style="width: ${percent}%;"></div>
            </div>
            <div style="font-size:0.75rem; color:#88505b; text-align:right; font-weight:bold; margin-bottom:10px;">
              ${percent}% Completed (${completedCount}/${steps.length} steps)
            </div>

            <div style="display:flex; gap:6px; margin-bottom:12px;">
              <button class="btn-small btn-edit" style="flex:1;" onclick="resetProjectChecklist('${proj.id}')">🔄 Reset Progress</button>
              <button class="btn-small btn-delete" onclick="deleteChecklistProject('${proj.id}')">🗑️ Delete Project</button>
            </div>

            <div>${stepsHtml || '<p style="font-size:0.8rem; color:#888; text-align:center;">No steps added yet.</p>'}</div>

            <div class="custom-step-box">
              <h4>+ Add Step to ${proj.name}</h4>
              <form onsubmit="addCustomStepToProject(event, '${proj.id}')">
                <input type="text" id="step-rnd-${proj.id}" placeholder="Rnd / Step Label (e.g. Rnd 22)" required>
                <input type="text" id="step-text-${proj.id}" placeholder="Pattern Instruction / Description" required>
                <input type="text" id="step-note-${proj.id}" placeholder="Extra Notes / Info (optional)">
                <button type="submit" class="action-btn" style="padding:8px; font-size:0.8rem;">+ Add Step</button>
              </form>
            </div>
          </div>
        </div>
      `;
    });
  }
</script>

</body>
</html>
